name: Build platform npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-platform-packages:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - key: linux-x64
            package_dir: packages/rsync-linux-x64
            package_name: '@xspect-build/rsync-linux-x64'
            asset_url: https://github.com/oferchen/rsync/releases/download/v0.6.0/oc-rsync-0.6.0-linux-x86_64-musl.tar.gz
            binary_name: oc-rsync
          - key: linux-arm64
            package_dir: packages/rsync-linux-arm64
            package_name: '@xspect-build/rsync-linux-arm64'
            asset_url: https://github.com/oferchen/rsync/releases/download/v0.6.0/oc-rsync-0.6.0-linux-aarch64-musl.tar.gz
            binary_name: oc-rsync
          - key: darwin-x64
            package_dir: packages/rsync-darwin-x64
            package_name: '@xspect-build/rsync-darwin-x64'
            asset_url: https://github.com/oferchen/rsync/releases/download/v0.6.0/oc-rsync-0.6.0-darwin-x86_64.tar.gz
            binary_name: oc-rsync
          - key: darwin-arm64
            package_dir: packages/rsync-darwin-arm64
            package_name: '@xspect-build/rsync-darwin-arm64'
            asset_url: https://github.com/oferchen/rsync/releases/download/v0.6.0/oc-rsync-0.6.0-darwin-aarch64.tar.gz
            binary_name: oc-rsync
          - key: win32-x64
            package_dir: packages/rsync-win32-x64
            package_name: '@xspect-build/rsync-win32-x64'
            asset_url: https://github.com/oferchen/rsync/releases/download/v0.6.0/oc-rsync-0.6.0-windows-x86_64.tar.gz
            binary_name: oc-rsync.exe

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Download and stage binary
        shell: bash
        run: |
          set -euo pipefail
          rm -rf /tmp/rsync-archive /tmp/rsync-extract
          mkdir -p /tmp/rsync-extract "${{ matrix.package_dir }}/bin" dist

          curl -fL "${{ matrix.asset_url }}" -o /tmp/rsync-archive.tar.gz
          tar -xzf /tmp/rsync-archive.tar.gz -C /tmp/rsync-extract

          BINARY_PATH="$(find /tmp/rsync-extract -type f -name "${{ matrix.binary_name }}" | head -n 1)"
          if [ -z "${BINARY_PATH}" ]; then
            echo "Binary not found in archive: ${{ matrix.binary_name }}"
            exit 1
          fi

          cp "${BINARY_PATH}" "${{ matrix.package_dir }}/bin/${{ matrix.binary_name }}"
          if [ "${{ matrix.binary_name }}" != "oc-rsync.exe" ]; then
            chmod +x "${{ matrix.package_dir }}/bin/${{ matrix.binary_name }}"
          fi

      - name: Pack platform package
        run: npm pack "${{ matrix.package_dir }}" --pack-destination dist

      - uses: actions/upload-artifact@v4
        with:
          name: npm-${{ matrix.key }}
          path: dist/*.tgz

  pack-main:
    runs-on: ubuntu-latest
    # Main package is packed after platform jobs so CI validates all platform artifacts first.
    needs: build-platform-packages

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Pack main package
        run: |
          mkdir -p dist
          npm pack . --pack-destination dist

      - uses: actions/upload-artifact@v4
        with:
          name: npm-main
          path: dist/*.tgz
