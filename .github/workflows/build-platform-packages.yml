name: Build platform npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-packages:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Stage binaries and pack all packages
        run: npm run release:pack

      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages
          path: dist/*.tgz
