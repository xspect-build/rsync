name: Build platform npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  id-token: write  # Required for OIDC
  contents: read

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-x64
            runner: macos-15-intel
          - target: darwin-arm64
            runner: macos-15

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds
      - name: Install Linux static build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y file make musl-tools

      - name: Run tests
        run: npm test

      - name: Build rsync and pack target package
        run: npm run release:pack -- --target=${{ matrix.target }}

      - uses: actions/upload-artifact@v6
        with:
          name: npm-packages-${{ matrix.target }}
          path: dist/*.tgz

  publish-packages:
    needs: build-packages
    runs-on: ubuntu-latest

    steps:
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          registry-url: 'https://registry.npmjs.org'
          package-manager-cache: false  # never use caching in release builds
      - name: Download all platform packages
        uses: actions/download-artifact@v6
        with:
          pattern: npm-packages-*
          path: dist
          merge-multiple: true

      - name: Publish packages to npm
        run: |
          for pkg in dist/*.tgz; do
            npm publish "./$pkg" --access public
          done
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
