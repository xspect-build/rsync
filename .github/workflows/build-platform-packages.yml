name: Build platform npm packages

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

permissions:
  contents: read

jobs:
  build-packages:
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-x64
            runner: ubuntu-latest
          - target: linux-arm64
            runner: ubuntu-24.04-arm
          - target: darwin-x64
            runner: macos-15
          - target: darwin-arm64
            runner: macos-latest

    runs-on: ${{ matrix.runner }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Linux static build tools
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y file make musl-tools

      - name: Run tests
        run: npm test

      - name: Build rsync and pack target package
        run: npm run release:pack -- --target=${{ matrix.target }}

      - uses: actions/upload-artifact@v4
        with:
          name: npm-packages-${{ matrix.target }}
          path: dist/*.tgz
